<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FNT + PNG 位图字体预览器</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }
        body {
            background: #1a1a1a;
            color: white;
            padding: 30px;
            max-width: 900px;
            margin: 0 auto;
        }
        .title {
            text-align: center;
            color: #4da6ff;
            margin-bottom: 10px;
        }
        .tip {
            text-align: center;
            color: #ccc;
            margin-bottom: 20px;
            font-size: 14px;
        }
        .status {
            text-align: center;
            color: #ff9900;
            margin: 10px 0;
            font-size: 15px;
        }
        .file-box {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .file-item {
            flex: 1;
            min-width: 250px;
        }
        input {
            padding: 8px;
            width: 100%;
            background: #2a2a2a;
            color: white;
            border: 1px solid #555;
            border-radius: 6px;
            margin-top: 5px;
        }
        #inputText {
            padding: 12px;
            font-size: 16px;
            margin-bottom: 12px;
        }
        .opts {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 16px;
            font-size: 14px;
            color: #ccc;
        }
        .opts select {
            padding: 8px 10px;
            max-width: 100%;
            background: #2a2a2a;
            color: white;
            border: 1px solid #555;
            border-radius: 6px;
        }
        .canvas-container {
            overflow-x: auto;
            overflow-y: hidden;
            border-radius: 10px;
            margin-top: 10px;
            border: 1px solid #444;
            width: 100%;
        }
        /* 预览 canvas 的显示尺寸须与 canvas.width/height 一致，勿用 width:100% 或固定 height，否则会拉伸位图 */
        #canvas {
            display: block;
        }
    </style>
</head>

<body>
    <h1 class="title">FNT + PNG 位图字体预览器</h1>
    <div class="tip">先选 .fnt 文件 → 再选 .png 文件 → 输入文字即可显示。<br>
        <span style="opacity:.85">混排大小写时若上下乱跳：保持「yoffset 相对行顶」。该字体一类导出常为大写 yoffset≈−1～−2、小写 yoffset≈10。</span></div>
    <div id="status" class="status">请选择字体文件...</div>

    <div class="file-box">
        <div class="file-item">
            <label>✅ 选择 .fnt 配置文件：</label>
            <input type="file" id="fileFnt" accept=".fnt">
        </div>
        <div class="file-item">
            <label>✅ 选择 .png 图片文件：</label>
            <input type="file" id="filePng" accept=".png">
        </div>
    </div>

    <input type="text" id="inputText" placeholder="输入要显示的文字..." value="Hello 123 Test">

    <div class="opts">
        <label for="yMode">yoffset 含义：</label>
        <select id="yMode" title="若字形上下乱跳，换另一种试试">
            <option value="line" selected>相对「行顶」（BMFont/Hiero 多数导出）</option>
            <option value="baseline">相对「基线」（AngelCode 文档字面）</option>
        </select>
    </div>

<script>
let fontData = null;
let fontMetrics = { lineHeight: 64, base: 48 };
let fontImage = null;
let canvas = null;
let ctx = null;
const statusText = document.getElementById('status');

function initCanvas() {
    canvas = document.getElementById('canvas');
    ctx = canvas.getContext('2d');
    // 初始占位；实际宽高在 redraw 中按 common.lineHeight 与文本宽度设置
    canvas.height = 200;
    canvas.width = 400;
    canvas.style.width = canvas.width + 'px';
    canvas.style.height = canvas.height + 'px';
}
if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', initCanvas);
} else {
    initCanvas();
}

// 选择 FNT
document.getElementById('fileFnt').addEventListener('change', async function(e) {
    if (!e.target.files[0]) return;
    statusText.textContent = "正在解析 FNT 文件...";
    
    const reader = new FileReader();
    reader.onload = function(evt) {
        try {
            parseFnt(evt.target.result);
            statusText.textContent = "✅ FNT 解析成功！请选择 PNG 文件";
        } catch (err) {
            statusText.textContent = "❌ FNT 解析失败：" + err.message;
        }
    };
    reader.readAsText(e.target.files[0]);
});

// 选择 PNG
document.getElementById('filePng').addEventListener('change', function(e) {
    if (!e.target.files[0]) return;
    statusText.textContent = "正在加载图片...";

    const img = new Image();
    img.onload = function() {
        fontImage = img;
        statusText.textContent = "✅ 字体加载完成！可以输入文字预览";
        redraw();
    };
    img.onerror = function() {
        statusText.textContent = "❌ 图片加载失败";
    };
    img.src = URL.createObjectURL(e.target.files[0]);
});

// 输入监听
document.getElementById('inputText').addEventListener('input', redraw);
document.getElementById('yMode').addEventListener('change', redraw);

function parseKeyValues(line) {
    const obj = {};
    const re = /(\w+)=(-?\d+)/g;
    let m;
    while ((m = re.exec(line)) !== null) {
        obj[m[1]] = parseInt(m[2], 10);
    }
    return obj;
}

// 解析 Angel Code BMFont 文本格式（common + char，含 xoffset/yoffset）
function parseFnt(text) {
    const chars = {};
    fontMetrics = { lineHeight: 64, base: 48 };
    const lines = text.split(/\r?\n/);

    for (let line of lines) {
        line = line.trim();
        if (line.startsWith('common ')) {
            const o = parseKeyValues(line);
            if (o.lineHeight > 0) fontMetrics.lineHeight = o.lineHeight;
            if (o.base !== undefined) fontMetrics.base = o.base;
            continue;
        }
        if (!line.startsWith('char ')) continue;

        const obj = parseKeyValues(line);
        if (obj.id !== undefined) {
            chars[String.fromCharCode(obj.id)] = obj;
        }
    }

    if (Object.keys(chars).length === 0) {
        throw new Error('未找到任何 char 定义');
    }

    fontData = chars;
    console.log('fontMetrics', fontMetrics, '解析到字符数：', Object.keys(chars).length);
}

function redraw() {
    if (!fontData || !fontImage || !canvas || !ctx) return;

    const text = document.getElementById('inputText').value || ' ';
    const spaceAdv = fontData[' '] && fontData[' '].xadvance != null ? fontData[' '].xadvance : 8;

    const missingChars = [];
    for (const c of text) {
        if (!fontData[c] && !missingChars.includes(c)) {
            missingChars.push(c);
        }
    }

    if (missingChars.length > 0) {
        statusText.textContent = `⚠️ 字体中缺少以下字符：${missingChars.join(' ')}`;
    } else {
        statusText.textContent = '✅ 字体加载完成！可以输入文字预览';
    }

    let totalWidth = 40;
    for (const c of text) {
        const d = fontData[c];
        totalWidth += d ? (d.xadvance || 0) : spaceAdv;
    }

    const margin = 20;
    const lineTop = margin;
    const lh = fontMetrics.lineHeight || 64;
    const base = fontMetrics.base != null ? fontMetrics.base : Math.floor(lh * 0.75);
    const baselineY = lineTop + base;

    canvas.height = Math.max(200, lineTop + lh + margin);
    canvas.width = Math.max(totalWidth, 400);
    canvas.style.width = canvas.width + 'px';
    canvas.style.height = canvas.height + 'px';
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    let penX = margin;

    for (const c of text) {
        const d = fontData[c];
        if (!d) {
            penX += spaceAdv;
            continue;
        }

        const xo = d.xoffset || 0;
        const yo = d.yoffset || 0;
        const w = d.width || 0;
        const h = d.height || 0;

        if (w > 0 && h > 0) {
            const drawX = penX + xo;
            // 多数 .fnt：yoffset = 行框顶边到字形位图顶边 → drawY = lineTop + yoffset
            // AngelCode 文档另一种表述：相对基线 → drawY = baselineY - yoffset（二者不同导出易混，故提供切换）
            const yMode = document.getElementById('yMode').value;
            const drawY = yMode === 'baseline' ? baselineY - yo : lineTop + yo;
            ctx.drawImage(
                fontImage,
                d.x, d.y, w, h,
                drawX, drawY, w, h
            );
        }

        penX += d.xadvance || 0;
    }
}
</script>

    <div class="canvas-container">
        <canvas id="canvas"></canvas>
    </div>
</body>
</html>
