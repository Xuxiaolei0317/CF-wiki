    <title>提取人机的名字</title>
    <link rel="stylesheet" href="./tool-common.css">

    <style>

        }
        body {
            max-width: 800px;
            margin: 50px auto;
            padding: 0 20px;
            background-color: #f0f2f5;
        }
        .container {

            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 2px 15px rgba(0,0,0,0.08);

            font-size: 24px;
        }

            padding: 20px;
            border-radius: 6px;
            background-color: #f9fafb;
        }
        .result-title {
            font-size: 16px;
            margin-bottom: 15px;
            font-weight: 600;
        }
        .name-list {
            list-style: none;
        }
        .name-item {
            padding: 10px;
            border-bottom: 1px solid #e5e7eb;
        }
        .name-item:last-child {
            border-bottom: none;
        }
        .success {
            color: #059669;
        }
        .info {
            color: #6b7280;
            font-size: 14px;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div class="container">

            <ul class="name-list" id="nameList">

        // 提取5位数ID的名字
        function extractNamesWith5DigitId() {
            const rankList = data.rank_ls;
            const namesWith5DigitId = [];
            
            rankList.forEach(item => {
                const id = item[3]; // 第4个元素是ID
                const name = item[2];
                // 检查ID是否为5位数
                if (id >= 10000 && id <= 99999) {
                    namesWith5DigitId.push({ name });
                }
            });
            
            return namesWith5DigitId;
        }

        // 显示结果
        function displayResults() {
            const results = extractNamesWith5DigitId();
            const nameListEl = document.getElementById('nameList');
            const infoEl = document.getElementById('info');
            
            if (results.length > 0) {
                results.forEach(item => {
                    const li = document.createElement('li');
                    li.className = 'name-item';
                    li.textContent = `${item.name}`;
                    nameListEl.appendChild(li);
                });
                infoEl.textContent = `共找到 ${results.length} 个5位数ID的名字`;
            } else {
                const li = document.createElement('li');
                li.className = 'name-item';
                li.textContent = '没有找到5位数ID的名字';
                nameListEl.appendChild(li);
            }
        }

        // 页面加载时执行
        window.onload = displayResults;
    </script>
