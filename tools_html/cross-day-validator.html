<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>跨天测试list</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#3B82F6',
                        secondary: '#10B981',
                        neutral: '#64748B',
                        light: '#F1F5F9',
                        dark: '#1E293B'
                    },
                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'sans-serif'],
                    },
                }
            }
        }
    </script>
    <style type="text/tailwindcss">
        @layer utilities {
            .content-auto {
                content-visibility: auto;
            }
            .preset-hover {
                @apply transition-all duration-200 hover:bg-light dark:hover:bg-dark/50;
            }
            .btn-effect {
                @apply transition-all duration-200 transform hover:scale-105 active:scale-95;
            }
        }
    </style>
</head>

<body class="bg-gray-50 dark:bg-gray-900 text-gray-800 dark:text-gray-100 min-h-screen">
    <div class="container mx-auto px-4 py-[0.9rem] max-w-none">
        <header class="mb-6 text-center">
            <h3 class="text-[clamp(1.17rem,2vw,1.5rem)] font-bold text-primary mb-2">跨天测试list</h3>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-4">
            <!-- 左侧预设配置区域 -->
            <div
                class="bg-white dark:bg-gray-800 rounded-xl shadow-md overflow-hidden transition-all duration-300 hover:shadow-lg">
                <div class="bg-primary text-white p-2">
                    <h2 class="text-xl font-semibold flex items-center">
                        <span><i class="fa fa-cogs mr-2"></i>预设list</span>
                    </h2>
                    <div class="mt-2 grid grid-cols-1 sm:grid-cols-3 gap-2">
                        <input id="preset-search" type="search" placeholder="搜索预设，例如 cash go / 邮票 / MP"
                            class="px-3 py-1 rounded-md text-sm text-gray-800 focus:outline-none focus:ring-2 focus:ring-white/60">
                        <select id="category-filter"
                            class="px-3 py-1 rounded-md text-sm text-gray-800 focus:outline-none focus:ring-2 focus:ring-white/60">
                            <option value="all">全部分类</option>
                            <option value="系统">系统</option>
                            <option value="主题">主题</option>
                        </select>
                        <div id="login-filter" class="grid grid-cols-4 gap-1">
                            <button type="button" data-login="1" class="login-filter-btn px-2 py-1 rounded-md text-sm whitespace-nowrap">登录1</button>
                            <button type="button" data-login="2" class="login-filter-btn px-2 py-1 rounded-md text-sm whitespace-nowrap">登录2</button>
                            <button type="button" data-login="3" class="login-filter-btn px-2 py-1 rounded-md text-sm whitespace-nowrap">登录3</button>
                            <button type="button" data-login="4" class="login-filter-btn px-2 py-1 rounded-md text-sm whitespace-nowrap">登录4</button>
                        </div>
                    </div>
                </div>
                <div class="p-3 max-h-[75vh] overflow-y-auto" id="presets-container">
                    <div id="presets-list" class="space-y-2">
                        <!-- 动态生成的预设项将在这里显示 -->
                    </div>
                </div>
                <div class="p-4 border-t border-gray-200 dark:border-gray-700 flex flex-wrap gap-2 justify-between">
                    <button id="add-preset"
                        class="bg-secondary text-white px-4 py-2 rounded-md btn-effect flex items-center">
                        <i class="fa fa-plus mr-2"></i>新增预设
                    </button>
                    <button id="reset-default"
                        class="bg-primary text-white px-4 py-2 rounded-md btn-effect flex items-center">
                        <i class="fa fa-refresh mr-2"></i>恢复默认
                    </button>
                    <button id="export-presets"
                        class="bg-blue-500 text-white px-4 py-2 rounded-md btn-effect flex items-center">
                        <i class="fa fa-download mr-2"></i>导出预设
                    </button>
                    <button id="import-presets"
                        class="bg-purple-500 text-white px-4 py-2 rounded-md btn-effect flex items-center">
                        <i class="fa fa-upload mr-2"></i>导入预设
                    </button>
                    <input id="import-presets-file" class="hidden" type="file" accept="application/json,.json">
                    <button id="clear-all"
                        class="bg-neutral text-white px-4 py-2 rounded-md btn-effect flex items-center">
                        <i class="fa fa-trash mr-2"></i>清空选中
                    </button>
                </div>
            </div>

            <!-- 右侧输出区域 -->
            <div
                class="bg-white dark:bg-gray-800 rounded-xl shadow-md overflow-hidden transition-all duration-300 hover:shadow-lg flex-1">
                <div class="bg-primary text-white p-2">
                    <h2 class="text-xl font-semibold flex items-center">
                        <i class="fa fa-list-alt mr-2"></i>输出内容
                    </h2>
                </div>
                <div class="p-3 max-h-[80vh] overflow-y-auto" id="output-container">
                    <!-- 添加复制按钮 -->
                    <div class="mb-4 flex justify-end">
                        <button id="copy-all-btn"
                            class="bg-secondary text-white px-4 py-2 rounded-md btn-effect flex items-center text-sm">
                            <i class="fa fa-copy mr-2"></i>复制所有内容
                        </button>
                    </div>
                    <ul id="output-list" class="space-y-2">
                        <!-- 动态生成的输出内容将在这里显示 -->
                    </ul>
                    <div id="empty-state" class="text-neutral text-center py-10 hidden">
                        <i class="fa fa-info-circle text-4xl mb-2"></i>
                        <p>没有选中的预设list项</p>
                    </div>
                    <!-- 复制成功提示 -->
                    <div id="copy-toast"
                        class="fixed top-4 right-4 bg-green-500 text-white px-4 py-2 rounded-md shadow-lg transform translate-y-[-100px] opacity-0 transition-all duration-300 flex items-center">
                        <i class="fa fa-check-circle mr-2"></i>
                        <span>复制成功！</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 编辑预设的模态框 -->
    <div id="edit-modal" class="fixed inset-0 bg-black/50 flex items-center justify-center z-50 hidden">
        <div class="bg-white dark:bg-gray-800 rounded-xl shadow-xl p-6 w-full max-w-md">
            <h3 class="text-xl font-semibold mb-4">编辑</h3>
            <div class="mb-4">
                <label for="preset-text" class="block mb-2 text-sm font-medium">预设内容</label>
                <textarea id="preset-text"
                    class="w-full p-2 border border-gray-300 dark:border-gray-600 rounded-md focus:outline-none focus:ring-2 focus:ring-primary dark:bg-gray-700"
                    rows="3"></textarea>
            </div>
            <div class="mb-4">
                <label for="preset-category" class="block mb-2 text-sm font-medium">标签</label>
                <select id="preset-category" class="w-full p-2 border border-gray-300 dark:border-gray-600 rounded-md focus:outline-none focus:ring-2 focus:ring-primary dark:bg-gray-700">
                    <option value="系统">系统</option>
                    <option value="主题">主题</option>
                </select>
            </div>
            <!-- 添加登录次数选择器 -->
            <div class="mb-4">
                <label for="preset-login" class="block mb-2 text-sm font-medium">登录次数</label>
                <select id="preset-login" class="w-full p-2 border border-gray-300 dark:border-gray-600 rounded-md focus:outline-none focus:ring-2 focus:ring-primary dark:bg-gray-700">
                    <option value="1">1</option>
                    <option value="2">2</option>
                    <option value="3">3</option>
                    <option value="4">4</option>
                </select>
            </div>
            <div class="mb-4">
                <label class="inline-flex items-center text-sm font-medium">
                    <input type="checkbox" id="preset-important" class="mr-2 h-4 w-4 accent-primary">
                    重要
                </label>
            </div>
            <input type="hidden" id="edit-index" value="-1">
            <div class="flex justify-end space-x-2">
                <button id="cancel-edit"
                    class="px-4 py-2 border border-gray-300 dark:border-gray-600 rounded-md btn-effect">取消</button>
                <button id="save-edit" class="px-4 py-2 bg-primary text-white rounded-md btn-effect">保存</button>
            </div>
        </div>
    </div>

    <script>
        const defaultLoginNumbers = [1, 2, 3, 4];
        const defaultSystemPresetTexts = [
            'login bonus领奖+活动强弹+活动中心活动配置检查、遍历跳转、购买',
            '社区群跳转',
            '大厅广告位活动检查+跳转+购买、大厅主题集合及排序检查',
            '新主题spin、新主题内侧边栏活动检查+跳转',
            'inbox领奖',
            '劳工节排行榜结算+奖励发放',
            '15分钟赛',
            '商店入场特效+金币购买+spin up购买+hotdeal购买+deal购买',
            '横竖版MB购买',
            'bonus games游玩',
            '邮票玩法开邮票包+灯神小游戏+frenzy spin+浏览邮票+排行榜',
            'byd开仓库+领取每日奖励+唤起C礼包活动、跳转、购买',
            'atw开购物袋+浏览shop+浏览排行榜',
            'mansion建造+浏览',
            '公会消息浏览+公会任务领奖+发送消息',
            'inbox检查',
            '大厅任务集合查看+跳转',
            '新主题内spin，领取41016活动奖励',
            '奖励中心蓝刮刮卡+红刮刮卡',
            '商店入场特效+金币购买+hotdeal购买+deal购买',
            '横竖版MB购买',
            'MP等级购买+奖励领取',
            '奖励中心蓝刮刮卡+红刮刮卡+领取/赠送好友邮票，金币，礼盒',
            'cash go 登陆领奖+spin+好友+宠物喂养',
            'daily mission主题内spin+消耗第二货币完成任务领奖',
            '个人中心更换头像形象+成就系统领奖+更换大厅皮肤',
            '邮票开包+frenzy spin+灯神游玩+灯神开包',
            'BYD+开包+C活动查看，跳转，购买，领奖',
            'ATW开包，收奖，set收奖',
            'BC刷新，完成任务，任务跳转，领取奖励',
            'soc小游戏',
            '使用绿宝石完成任务领奖',
            '劳工节所有玩法+开卡包+小游戏',
            '劳工节各个促销跳转+购买',
            'merge游玩+Bpass收奖+关卡收奖+劳工节pass领奖',
            'rocket游玩+Bpass收奖+关卡收奖+购买token礼包booster礼包',
            'journey游玩+Bpass收奖+boss玩法+购买booster1使用',
            'cash go 登陆领奖，领取好友赠送spin',
            '10倍spin+建造切场景+偷钱+攻击+喂养+C活动付费',
            'mansion建造',
            '公会发消息+查看成员信息+完成公会任务领奖',
        ];

        const defaultExtraPresets = [
            { text: '成就系统领奖；奖励中心跳转', category: '系统', login: 1 },
        ];

        const defaultThemePresetTexts = [
            '主题所有玩法显示和奖励正常',
            'base预售活动不同状态的多语显示和购买',
            'base预售倒计时显示',
            'base预售视频播放正常',
            'mb活动多语显示和购买',
            'mb视频播放正常',
            '三合一倒计时时间',
            '三合一活动多语显示和完成情况',
            '三合一奖励兑换',
            'newgame新机台多语显示',
            'newgame视频播放正常',
            'mega77倒计时显示',
            'mega77未完成状态多语显示',
            'mega77完成状态多语显示',
            'mega77完成的弹窗奖励显示',
            'badge多语显示和完成情况',
            '游戏和主题loading多语显示',
            'comming多语显示',
            '新主题BC显示和完成情况',
            '新主题GM多语显示和购买',
            '新主题玩法高低级房第二货币额外消耗',
            'game rule描述，pay值和JP倍数显示正确，多语链接跳转正常',
            '主题活动界面各按钮跳转',
            '新主题GM购买后GM功能正常',
            '主题皮肤显示',
            '主题大厅分类',
            '高低级房选bet界面显示',
            '主题大小icon多语显示',
        ];

        function createPreset(text, category = '系统', login = 1, overrides = {}) {
            return { text, checked: false, category, login, ...overrides };
        }

        function createDefaultPresets() {
            const systemPresets = defaultLoginNumbers.flatMap(login =>
                defaultSystemPresetTexts.map(text => createPreset(text, '系统', login))
            );
            const extraPresets = defaultExtraPresets.map(preset =>
                createPreset(preset.text, preset.category, preset.login)
            );
            const themePresets = defaultThemePresetTexts.map(text => createPreset(text, '主题', 1));
            return [...systemPresets, ...extraPresets, ...themePresets];
        }

        function normalizePreset(preset) {
            return {
                text: String(preset.text || ''),
                checked: Boolean(preset.checked),
                category: preset.category || '系统',
                login: parseInt(preset.login, 10) || 1,
                important: Boolean(preset.important),
                ...(preset.checkTime ? { checkTime: preset.checkTime } : {}),
            };
        }

        function loadPresets() {
            const savedPresets = localStorage.getItem('presets');
            if (!savedPresets) {
                return createDefaultPresets();
            }

            try {
                const parsedPresets = JSON.parse(savedPresets);
                if (Array.isArray(parsedPresets)) {
                    return parsedPresets.map(normalizePreset).filter(preset => preset.text);
                }
            } catch (error) {
                console.warn('预设数据解析失败，已恢复默认预设:', error);
            }

            return createDefaultPresets();
        }

        let presets = loadPresets();

        // 保存预设数据到localStorage
        function savePresetsToLocalStorage() {
            localStorage.setItem('presets', JSON.stringify(presets));
        }

        function refreshPresetView() {
            renderPresets();
            updateOutput();
            savePresetsToLocalStorage();
        }

        // DOM 元素
        const presetsList = document.getElementById('presets-list');
        const outputList = document.getElementById('output-list');
        const emptyState = document.getElementById('empty-state');
        const addPresetBtn = document.getElementById('add-preset');
        const resetDefaultBtn = document.getElementById('reset-default');
        const exportPresetsBtn = document.getElementById('export-presets');
        const importPresetsBtn = document.getElementById('import-presets');
        const importPresetsFileInput = document.getElementById('import-presets-file');
        const clearAllBtn = document.getElementById('clear-all');
        const presetSearchInput = document.getElementById('preset-search');
        const categoryFilterSelect = document.getElementById('category-filter');
        const loginFilterGroup = document.getElementById('login-filter');
        const loginFilterButtons = document.querySelectorAll('.login-filter-btn');
        const editModal = document.getElementById('edit-modal');
        const presetTextInput = document.getElementById('preset-text');
        const editIndexInput = document.getElementById('edit-index');
        const saveEditBtn = document.getElementById('save-edit');
        const cancelEditBtn = document.getElementById('cancel-edit');
        
        // 从 localStorage 加载保存的组合筛选状态
        let currentCategory = localStorage.getItem('currentCategory') || '系统';
        let currentLogin = ['1', '2', '3', '4'].includes(localStorage.getItem('currentLogin')) ? localStorage.getItem('currentLogin') : '1';
        let searchKeyword = localStorage.getItem('searchKeyword') || '';
        
        // 根据login值返回对应的CSS类
        function getLoginColorClass(login) {
            switch(Number(login)) {
                case 1:
                    return 'bg-red-100 text-red-800 dark:bg-red-900 dark:text-red-200';
                case 2:
                    return 'bg-orange-100 text-orange-800 dark:bg-orange-900 dark:text-orange-200';
                case 3:
                    return 'bg-yellow-100 text-yellow-800 dark:bg-yellow-900 dark:text-yellow-200';
                case 4:
                    return 'bg-green-100 text-green-800 dark:bg-green-900 dark:text-green-200';
                default:
                    return 'bg-gray-100 text-gray-800 dark:bg-gray-700 dark:text-gray-200';
            }
        }
        


        function getFilteredPresets() {
            const normalizedKeyword = searchKeyword.trim().toLowerCase();
            return presets.filter(preset => {
                const matchesCategory = currentCategory === 'all' || preset.category === currentCategory;
                const shouldApplyLoginFilter = currentCategory !== '主题';
                const matchesLogin = !shouldApplyLoginFilter || currentLogin === 'all' || Number(preset.login || 1) === Number(currentLogin);
                const matchesSearch = !normalizedKeyword || preset.text.toLowerCase().includes(normalizedKeyword);
                return matchesCategory && matchesLogin && matchesSearch;
            });
        }

        // 渲染预设列表
        function renderPresets() {
            presetsList.innerHTML = '';
            const filteredPresets = getFilteredPresets();
            
            filteredPresets.forEach((preset, index) => {
                // 获取原始索引，用于编辑和删除操作
                const originalIndex = presets.indexOf(preset);
                const importantTextClass = preset.important ? 'text-red-600 dark:text-red-400 font-bold' : '';
                const presetItem = document.createElement('div');
                presetItem.className = 'flex items-center p-0.5 rounded-md preset-hover';
                presetItem.innerHTML = `
                    <span class="mr-2 w-6 text-center">${index + 1}.</span>
                    <input type="checkbox" id="preset-${originalIndex}" class="mr-2 h-4 w-4 accent-primary" ${preset.checked ? 'checked' : ''}>
                    <label for="preset-${originalIndex}" class="flex-grow cursor-pointer ${importantTextClass}">${preset.text}</label>
                    ${preset.important ? '<span class="px-2 py-1 rounded text-xs mr-2 bg-red-100 text-red-800 dark:bg-red-900 dark:text-red-200 font-bold">重要</span>' : ''}
                    <span class="px-2 py-1 rounded text-xs mr-2 ${getLoginColorClass(preset.login || 1)}">${preset.login || 1}</span>
                    <span class="px-2 py-1 rounded text-xs mr-2 ${preset.category === '系统' ? 'bg-blue-100 text-blue-800' : 'bg-green-100 text-green-800'}">${preset.category}</span>
                    <button class="edit-btn text-neutral hover:text-primary mr-2" data-index="${originalIndex}">
                        <i class="fa fa-pencil"></i>
                    </button>
                    <button class="delete-btn text-neutral hover:text-red-500" data-index="${originalIndex}">
                        <i class="fa fa-trash"></i>
                    </button>
                `;
                presetsList.appendChild(presetItem);
                
                // 添加事件监听器（保持不变）
                // 修改复选框事件监听器，添加时间戳记录
                const checkbox = presetItem.querySelector('input[type="checkbox"]');
                checkbox.addEventListener('change', () => {
                    preset.checked = checkbox.checked;
                    // 记录勾选时间戳
                    if (preset.checked) {
                        preset.checkTime = Date.now();
                    } else {
                        // 取消勾选时移除时间戳
                        delete preset.checkTime;
                    }
                    updateOutput();
                    savePresetsToLocalStorage();
                });
                
                const editBtn = presetItem.querySelector('.edit-btn');
                editBtn.addEventListener('click', () => openEditModal(originalIndex));
                
                const deleteBtn = presetItem.querySelector('.delete-btn');
                deleteBtn.addEventListener('click', () => deletePreset(originalIndex));
            });
        }

        // 初始化筛选器状态
        function initFilter() {
            presetSearchInput.value = searchKeyword;
            categoryFilterSelect.value = currentCategory;
            updateLoginFilterVisibility();
            updateLoginFilterButtons();
            renderPresets();
        }

        function updateLoginFilterVisibility() {
            if (currentCategory === '主题') {
                currentLogin = 'all';
                loginFilterGroup.classList.add('hidden');
                localStorage.setItem('currentLogin', currentLogin);
            } else {
                if (!['1', '2', '3', '4'].includes(currentLogin)) {
                    currentLogin = '1';
                    localStorage.setItem('currentLogin', currentLogin);
                }
                loginFilterGroup.classList.remove('hidden');
                updateLoginFilterButtons();
            }
        }

        function updateLoginFilterButtons() {
            loginFilterButtons.forEach(button => {
                const isActive = button.dataset.login === currentLogin;
                button.classList.toggle('bg-white/30', isActive);
                button.classList.toggle('text-white', isActive);
                button.classList.toggle('bg-white', !isActive);
                button.classList.toggle('text-gray-800', !isActive);
            });
        }

        presetSearchInput.addEventListener('input', () => {
            searchKeyword = presetSearchInput.value;
            localStorage.setItem('searchKeyword', searchKeyword);
            renderPresets();
        });

        categoryFilterSelect.addEventListener('change', () => {
            currentCategory = categoryFilterSelect.value;
            localStorage.setItem('currentCategory', currentCategory);
            updateLoginFilterVisibility();
            renderPresets();
        });

        loginFilterButtons.forEach(button => {
            button.addEventListener('click', () => {
                currentLogin = button.dataset.login;
                localStorage.setItem('currentLogin', currentLogin);
                updateLoginFilterButtons();
                renderPresets();
            });
        });

        // 修改updateOutput函数，按勾选时间排序
        function updateOutput() {
            const checkedPresets = presets.filter(preset => preset.checked);
        
            outputList.innerHTML = '';
        
            if (checkedPresets.length === 0) {
                emptyState.classList.remove('hidden');
                return;
            }
        
            emptyState.classList.add('hidden');
        
            // 按登录次数分组
            const groupedByLogin = {};
            checkedPresets.forEach(preset => {
                const loginNumber = preset.login || 1; // 默认第1次登录
                if (!groupedByLogin[loginNumber]) {
                    groupedByLogin[loginNumber] = [];
                }
                groupedByLogin[loginNumber].push(preset);
            });
        
            // 获取所有登录次数并排序
            const loginNumbers = Object.keys(groupedByLogin).map(Number).sort((a, b) => a - b);
        
            // 为每个登录次数创建分组显示
            loginNumbers.forEach(loginNumber => {
                const loginGroup = groupedByLogin[loginNumber];
                
                // 按勾选时间排序
                loginGroup.sort((a, b) => {
                    // 如果有checkTime属性，则按时间戳排序
                    if (a.checkTime && b.checkTime) {
                        return a.checkTime - b.checkTime;
                    }
                    // 否则保持原有顺序
                    return 0;
                });
                
                // 创建登录次数标题
                const groupHeader = document.createElement('div');
                groupHeader.className = `font-bold text-lg mb-2 mt-0 first:mt-0 ${getLoginColorClass(loginNumber)}`;
                groupHeader.textContent = `第${loginNumber}次登录：`;
                outputList.appendChild(groupHeader);
                
                // 添加该登录次数下的所有项
                loginGroup.forEach((preset, index) => {
                    const listItem = document.createElement('li');
                    listItem.className = 'flex items-start p-2 border-b border-gray-100 dark:border-gray-700 last:border-0 ml-4';
                    const importantTextClass = preset.important ? 'text-red-600 dark:text-red-400 font-bold' : '';
                    listItem.innerHTML = `
                        <span class="inline-block bg-primary/10 text-primary rounded-full w-6 h-6 flex items-center justify-center mr-2 mt-0.5 flex-shrink-0">${index + 1}</span>
                        <span class="${importantTextClass}">${preset.text}</span>
                    `;
                    outputList.appendChild(listItem);
                });
            });
        }

        // 打开编辑模态框
        function openEditModal(index) {
            const preset = presets[index];
            presetTextInput.value = preset.text;
            // 设置类别选择
            const categorySelect = document.getElementById('preset-category');
            categorySelect.value = preset.category || '系统'; // 默认系统类别
            // 设置登录次数选择
            const loginSelect = document.getElementById('preset-login');
            loginSelect.value = preset.login || 1; // 默认第1次登录
            const importantInput = document.getElementById('preset-important');
            importantInput.checked = Boolean(preset.important);
            editIndexInput.value = index;
            editModal.classList.remove('hidden');
            presetTextInput.focus();
        }

        // 关闭编辑模态框
        function closeEditModal() {
            editModal.classList.add('hidden');
            presetTextInput.value = '';
            document.getElementById('preset-important').checked = false;
            editIndexInput.value = '-1';
        }

        // 保存编辑的预设
        function saveEdit() {
            const index = parseInt(editIndexInput.value);
            if (index >= 0 && index < presets.length) {
                const newText = presetTextInput.value.trim();
                if (newText) {
                    presets[index].text = newText;
                    // 保存类别选择
                    presets[index].category = document.getElementById('preset-category').value;
                    // 保存登录次数选择
                    presets[index].login = parseInt(document.getElementById('preset-login').value);
                    // 保存重要标记
                    presets[index].important = document.getElementById('preset-important').checked;
                    renderPresets();
                    updateOutput();
                    savePresetsToLocalStorage(); // 保存到localStorage
                }
            }
            closeEditModal();
        }

        // 删除预设
        function deletePreset(index) {
            if (confirm('确定要删除这个预设吗？')) {
                presets.splice(index, 1);
                renderPresets();
                updateOutput();
                savePresetsToLocalStorage(); // 保存到localStorage
            }
        }

        // 添加新预设
        function addPreset() {
            // 添加默认类别为"系统"，默认登录次数为1
            presets.push({text:'新预设内容', checked: false, category: '系统', login: 1 });
            renderPresets();
            // 自动打开编辑框
            openEditModal(presets.length - 1);
            savePresetsToLocalStorage(); // 保存到localStorage
        }

        // 清空所有选中状态
        function clearAllChecked() {
            if (confirm('确定要取消所有选中状态吗？')) {
                presets.forEach(preset => {
                    preset.checked = false;
                    delete preset.checkTime;
                });
                renderPresets();
                updateOutput();
                savePresetsToLocalStorage(); // 保存到localStorage
            }
        }

        // 恢复默认预设
        function resetDefaultPresets() {
            if (confirm('恢复默认预设会覆盖当前所有自定义预设，确定继续吗？')) {
                presets = createDefaultPresets();
                refreshPresetView();
            }
        }

        // 导出当前预设
        function exportPresets() {
            const exportData = {
                version: 1,
                exportedAt: new Date().toISOString(),
                presets,
            };
            const blob = new Blob([JSON.stringify(exportData, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const link = document.createElement('a');
            link.href = url;
            link.download = `cross-day-presets-${new Date().toISOString().slice(0, 10)}.json`;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            URL.revokeObjectURL(url);
        }

        function getPresetKey(preset) {
            return `${preset.category || '系统'}::${preset.login || 1}::${preset.text}`;
        }

        function mergePresets(importedPresets) {
            const existingKeys = new Set(presets.map(getPresetKey));
            const mergedPresets = [...presets];
            importedPresets.forEach(preset => {
                const key = getPresetKey(preset);
                if (!existingKeys.has(key)) {
                    mergedPresets.push(preset);
                    existingKeys.add(key);
                }
            });
            return mergedPresets;
        }

        // 导入预设文件
        function importPresetsFromFile(file) {
            if (!file) {
                return;
            }

            const reader = new FileReader();
            reader.onload = () => {
                try {
                    const importedData = JSON.parse(reader.result);
                    const importedPresets = Array.isArray(importedData) ? importedData : importedData.presets;
                    if (!Array.isArray(importedPresets)) {
                        throw new Error('文件中未找到 presets 数组');
                    }

                    const normalizedPresets = importedPresets.map(normalizePreset).filter(preset => preset.text);
                    if (normalizedPresets.length === 0) {
                        throw new Error('没有可用的预设内容');
                    }

                    const importMode = prompt(`将导入 ${normalizedPresets.length} 条预设。\n输入 1：合并到当前预设（跳过同分类、同登录、同内容的重复项）\n输入 2：覆盖当前全部预设`, '1');
                    if (importMode === null) {
                        return;
                    }

                    if (importMode === '1') {
                        presets = mergePresets(normalizedPresets);
                        refreshPresetView();
                    } else if (importMode === '2') {
                        presets = normalizedPresets;
                        refreshPresetView();
                    } else {
                        alert('导入已取消：请输入 1 或 2');
                    }
                } catch (error) {
                    console.error('导入预设失败:', error);
                    alert(`导入失败：${error.message}`);
                } finally {
                    importPresetsFileInput.value = '';
                }
            };
            reader.readAsText(file);
        }

        // 添加事件监听器
        addPresetBtn.addEventListener('click', addPreset);
        resetDefaultBtn.addEventListener('click', resetDefaultPresets);
        exportPresetsBtn.addEventListener('click', exportPresets);
        importPresetsBtn.addEventListener('click', () => importPresetsFileInput.click());
        importPresetsFileInput.addEventListener('change', () => importPresetsFromFile(importPresetsFileInput.files[0]));
        clearAllBtn.addEventListener('click', clearAllChecked);
        saveEditBtn.addEventListener('click', saveEdit);
        cancelEditBtn.addEventListener('click', closeEditModal);

        // 复制所有输出内容功能
        document.getElementById('copy-all-btn').addEventListener('click', function () {
            const outputItems = document.querySelectorAll('#output-list li');
            if (outputItems.length === 0) {
                alert('没有可复制的内容');
                return;
            }

            // 提取所有选中项文本
            let content = '验证内容：\n'; // 添加预设语句，不带有序号
            
            // 按登录次数分组准备复制内容
            const groupedByLogin = {};
            const checkedPresets = presets.filter(preset => preset.checked);
            
            checkedPresets.forEach(preset => {
                const loginNumber = preset.login || 1; // 默认第1次登录
                if (!groupedByLogin[loginNumber]) {
                    groupedByLogin[loginNumber] = [];
                }
                groupedByLogin[loginNumber].push(preset);
            });
            
            // 获取所有登录次数并排序
            const loginNumbers = Object.keys(groupedByLogin).map(Number).sort((a, b) => a - b);
            
            // 构建分组格式的复制内容
            loginNumbers.forEach(loginNumber => {
                content += `第${loginNumber}次登录：\n`;
                groupedByLogin[loginNumber].sort((a, b) => {
                    if (a.checkTime && b.checkTime) {
                        return a.checkTime - b.checkTime;
                    }
                    return presets.indexOf(a) - presets.indexOf(b);
                });
                groupedByLogin[loginNumber].forEach((preset, index) => {
                    const importantPrefix = preset.important ? '【重要】' : '';
                    content += `${index + 1}、${importantPrefix}${preset.text}\n`;
                });
                content += '\n'; // 分组之间添加空行
            });

            // 复制到剪贴板
            navigator.clipboard.writeText(content.trim()).then(() => {
                // 显示复制成功提示
                const toast = document.getElementById('copy-toast');
                toast.classList.remove('translate-y-[-100px]', 'opacity-0');

                // 3秒后隐藏提示
                setTimeout(() => {
                    toast.classList.add('translate-y-[-100px]', 'opacity-0');
                }, 3000);
            }).catch(err => {
                console.error('复制失败:', err);
                alert('复制失败，请手动复制');
            });
        });

        // 点击模态框外部关闭
        editModal.addEventListener('click', (e) => {
            if (e.target === editModal) {
                closeEditModal();
            }
        });
        // 在文件末尾，initFilter() 和 renderPresets() 调用之前添加辅助函数
        // 获取登录次数对应的颜色类
        // 初始化
        initFilter();
        updateOutput();
    </script>
</body>

</html>
